name: Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get remove -y containerd || true
          sudo apt-get update
          sudo apt-get install -y jq

      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg

          # Base configuration (basic info, stats, repositories)
          base: header, activity, community, repositories

          # Languages configuration
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_ignored: html, css, dockerfile, makefile, shell

          plugin_languages_indepth_custom: Strathon/core

          commits_authoring: dezobq, dezobq@users.noreply.github.com

          config_timezone: America/Toronto
